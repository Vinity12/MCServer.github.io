<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Minecraft Server</title>
    <style>
        body { font-family: sans-serif; text-align: center; margin-top: 50px; }
        .online { color: green; font-weight: bold; }
        .offline { color: red; font-weight: bold; }
    </style>
</head>
<body>
    <h1>Server Status</h1>
    <p>Status: <span id="status">Pinging server...</span></p>
    <p>Players Online: <span id="players">0 / 0</span></p>
    
    <script>
    const serverAddress = "147.185.221.29:38073";

    fetch(`https://api.mcsrvstat.us/bedrock/3/${serverAddress}`)
        .then(response => response.json())
        .then(data => {
            const statusEl = document.getElementById("status");
            const playersEl = document.getElementById("players");

            if (data.online) {
                statusEl.textContent = "Online 🟢";
                statusEl.className = "online";
                playersEl.textContent = `${data.players?.online ?? 0} / ${data.players?.max ?? 0}`;
            } else {
                statusEl.textContent = "Offline 🔴";
                statusEl.className = "offline";
                playersEl.textContent = "-";
            }

            // Debug info so you can see WHY it says what it says
            const debug = data.debug || {};
            const debugLine = document.createElement("p");
            debugLine.style.fontSize = "0.8em";
            debugLine.style.color = "#888";
            debugLine.textContent =
                `ping: ${debug.ping} | cachehit: ${debug.cachehit} | ` +
                (debug.cachetime ? `cached at: ${new Date(debug.cachetime * 1000).toLocaleTimeString()}` : "");
            document.body.appendChild(debugLine);
        })
        .catch(error => {
            document.getElementById("status").textContent = "Error fetching status";
            console.error(error);
        });
</script>
</body>
</html>
